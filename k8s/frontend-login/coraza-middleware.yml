apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: coraza-waf
  namespace: login
spec:
  plugin:
    coraza:
      directives:
        - SecRuleEngine DetectionOnly
        - SecRequestBodyAccess On
        - SecResponseBodyAccess Off
        - SecAuditEngine RelevantOnly
        - SecAuditLog /dev/stdout
        - SecAuditLogFormat JSON
        - SecRule REQUEST_METHOD "!@within GET HEAD POST OPTIONS" "id:300001,phase:1,log,deny,status:405,msg:'disallowed method'"
        - SecRule REQUEST_URI "@rx (?i)(/debug|/actuator|/internal)" "id:300002,phase:1,log,deny,status:403,msg:'restricted login path'"
        - SecRule ARGS "@rx (?i)(union.*select|drop.*table|insert.*into)" "id:300003,phase:2,log,deny,status:403,msg:'SQL injection attempt'"
