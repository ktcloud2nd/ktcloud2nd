#도커 이미지 빌드 workflow 초안
name: Docker Build & Push

on:
  push:
    branches:
      - aws-web
    paths:
      - 'apps/web-platform/**'

env:
  DOCKERHUB_USERNAME: wooyeol43
  FRONTEND_DIR: apps/web-platform/frontend
  BACKEND_DIR: apps/web-platform/backend
  LOGIN_APP_URL: http://app.example.com/login
  OPERATOR_LOGIN_APP_URL: http://admin.example.com/login
  USER_APP_URL: http://app.example.com/home
  OPERATOR_APP_URL: http://admin.example.com/home

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      # ── Backend 이미지 ──────────────────────────────────────────

      - name: login-backend 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/login-backend:latest
          build-args: APP_TARGET=login

      - name: user-backend 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/user-backend:latest
          build-args: APP_TARGET=user

      - name: operator-backend 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.BACKEND_DIR }}
          file: ${{ env.BACKEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/operator-backend:latest
          build-args: APP_TARGET=operator

      # ── Frontend 이미지 ─────────────────────────────────────────

      - name: login-frontend-user 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/login-frontend-user:latest
          build-args: |
            APP_TARGET=login
            NGINX_CONF=nginx.login.conf
            VITE_LOGIN_APP_URL=${{ env.LOGIN_APP_URL }}
            VITE_USER_APP_URL=${{ env.USER_APP_URL }}
            VITE_OPERATOR_APP_URL=${{ env.OPERATOR_APP_URL }}

      - name: login-frontend-operator 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/login-frontend-operator:latest
          build-args: |
            APP_TARGET=login
            NGINX_CONF=nginx.login-operator.conf
            VITE_LOGIN_APP_URL=${{ env.OPERATOR_LOGIN_APP_URL }}
            VITE_USER_APP_URL=${{ env.USER_APP_URL }}
            VITE_OPERATOR_APP_URL=${{ env.OPERATOR_APP_URL }}

      - name: user-frontend 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/user-frontend:latest
          build-args: |
            APP_TARGET=user
            NGINX_CONF=nginx.user.conf
            VITE_LOGIN_APP_URL=${{ env.LOGIN_APP_URL }}
            VITE_USER_APP_URL=${{ env.USER_APP_URL }}
            VITE_OPERATOR_APP_URL=${{ env.OPERATOR_APP_URL }}

      - name: operator-frontend 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.FRONTEND_DIR }}
          file: ${{ env.FRONTEND_DIR }}/Dockerfile
          push: true
          tags: ${{ env.DOCKERHUB_USERNAME }}/operator-frontend:latest
          build-args: |
            APP_TARGET=operator
            NGINX_CONF=nginx.operator.conf
            VITE_LOGIN_APP_URL=${{ env.OPERATOR_LOGIN_APP_URL }}
            VITE_USER_APP_URL=${{ env.USER_APP_URL }}
            VITE_OPERATOR_APP_URL=${{ env.OPERATOR_APP_URL }}
