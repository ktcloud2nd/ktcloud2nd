name: 'Azure Bootstrap Deploy'

on:
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업을 선택하세요'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy

env:
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION }}
  TF_VAR_public_key: ${{ secrets.AZURE_PUBLIC_KEY }}
  TF_VAR_onprem_ip: ${{ secrets.ONPREM_SOURCE_IP }}

jobs:
  build-image:
    name: 'Build and Push Docker Image'
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.action == 'apply' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Kafka Connect Image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/azure/ansible/roles/kafka-consumer/templates
          file: ./infra/azure/ansible/roles/kafka-consumer/templates/Dockerfile.j2
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/custom-kafka-connect:latest

      - name: Build and Push Edge Simulator Image
        uses: docker/build-push-action@v6
        with:
          context: ./infra/edge
          file: ./infra/edge/Dockerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/vehicle-simulator:latest

  terraform-azure:
    name: 'Terraform Azure Bootstrap'
    needs: build-image
    if: |
      always() &&
      (github.event.inputs.action == 'destroy' ||
      (github.event.inputs.action == 'apply' && needs.build-image.result == 'success'))
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/azure/terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve

      - name: Show Bastion bootstrap info
        if: ${{ github.event.inputs.action == 'apply' }}
        run: |
          echo "Bastion Public IP: $(terraform output -raw bastion_public_ip)"
          echo "Broker Private IP: $(terraform output -raw broker_private_ip)"
          echo "Consumer Private IP: $(terraform output -raw consumer_private_ip)"
          echo "Next: install the self-hosted runner on bastion, then run Azure Configure via Bastion Runner."
