[all:vars]
# SSH 접속 사용자 (AWS Ubuntu AMI 기준)
ansible_user=ubuntu

# SSM Session Manager를 통한 접속 (SSH 포트 불필요)
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="aws ssm start-session --target %h --document-name AWS-StartSSHSession --parameters portNumber=%p"'

[masters]
# terraform apply 후 ansible_inventory.tf가 자동으로 채워줌
# master_a ansible_host=i-xxxx private_ip=10.x.x.x
# master_c ansible_host=i-xxxx private_ip=10.x.x.x

[k8s_cluster:children]
masters

# [참고] 워커 노드는 ASG user_data로 자동 조인 → 정적 인벤토리 불필요