---
- name: Kafka 루트 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/kafka-cluster"
    state: directory
    mode: '0755'

- name: 브로커별 데이터 디렉토리 생성
  file:
    path: "/home/{{ ansible_user }}/kafka-cluster/data/kafka{{ item }}"
    state: directory
    mode: '0755'
  loop: [1, 2, 3]

- name: Docker Compose 템플릿 배포
  template:
    src: docker-compose.yml.j2
    dest: "/home/{{ ansible_user }}/kafka-cluster/docker-compose.yml"

- name: Kafka 브로커 컨테이너 실행
  become: yes
  shell:
    cmd: "docker compose up -d"
    chdir: "/home/{{ ansible_user }}/kafka-cluster"